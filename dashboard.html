<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Produção</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<h1>Dashboard Produção</h1>

<!-- KPIs -->
<div class="kpi-container">
  <div class="kpi">
    <span id="kpi-selecionado">0</span>
    <small>Total Selecionado</small>
  </div>
  <div class="kpi">
    <span id="kpi-mes">0</span>
    <small>Total do Mês</small>
  </div>
</div>

<!-- RESUMO SEMANAL -->
<h3>Resumo Semanal</h3>
<div id="resumo-semanal" class="resumo-semanal"></div>

<h3>Local</h3>
<div id="botoes-lab" class="painel-botoes"></div>

<h3>Terminais</h3>
<div id="botoes-terminais" class="painel-botoes"></div>

<div class="grafico-container">
  <div id="faixa-semanas"></div>
</div>

<!-- JS -->
<script src="script_dia.js"></script>

</body>
</html>
