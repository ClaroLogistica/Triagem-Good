<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Reversa &amp; Recuperação | Triagem Massivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style-login.css">
</head>

<body class="login-body">

  <div class="login-container">

    <img src="assets/logo-logistica.png" alt="Logo Logística" class="login-logo">

    <h1 class="login-title">
  <strong>Reversa &amp; Recuperação</strong><br>
  <span>Triagem Massivo</span>
</h1>

    <form onsubmit="return validarSenha()">
      <input type="password" id="senha" placeholder="Digite a senha">
      <button type="submit">Entrar</button>
    </form>

  </div>

  <script>
    function validarSenha() {
      const senha = document.getElementById("senha").value;
      if (senha === "000") {
        window.location.href = "dashboard.html";
      } else {
        alert("Senha Incorreta");
      }
      return false;
    }
  </script>

</body>
</html>
