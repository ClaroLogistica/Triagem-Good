<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Produção</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="barra-filtros">
  <select id="select-local" class="filtro-select" multiple>
  </select>

  <button id="btn-filtros" class="btn-filtros">Filtros</button>
</div>
  
<h1>Dashboard Produção</h1>

<!-- KPIs -->
<div class="kpi-container">
  <div class="kpi">
    <span id="kpi-selecionado">0</span>
    <small>Total Selecionado</small>
  </div>
  <div class="kpi">
    <span id="kpi-mes">0</span>
    <small>Total do Mês</small>
  </div>
</div>

<!-- RESUMO SEMANAL -->
<h3>Resumo Semanal</h3>
<div id="resumo-semanal" class="resumo-semanal"></div>

<h3>Local</h3>
<select id="select-local" class="filtro-select"></select>

<h3>Terminais</h3>
<div class="multiselect">
  <button id="btn-terminais">Selecionar Terminais ▾</button>
  <div id="lista-terminais" class="multiselect-opcoes"></div>
</div>

<h3>Acessórios</h3>
<div class="multiselect">
  <button id="btn-acessorios">Selecionar Acessórios ▾</button>
  <div id="lista-acessorios" class="multiselect-opcoes"></div>
</div>


<div class="grafico-container">
  <canvas id="graficoDiario"></canvas>
  <div id="faixa-semanas"></div>
</div>

<!-- JS -->
<script src="script_dia.js"></script>

</body>
  <div id="modal-filtros" class="modal">
  <div class="modal-conteudo">
    <h2>Filtros</h2>

    <div class="bloco-filtro">
      <h4>Tipo</h4>
      <label><input type="radio" name="tipo" value="Terminais"> Terminais</label>
      <label><input type="radio" name="tipo" value="Acessórios"> Acessórios</label>
    </div>

    <div class="bloco-filtro">
      <h4>Giro</h4>
      <label><input type="checkbox" value="Alto Giro" class="chk-giro"> Alto Giro</label>
      <label><input type="checkbox" value="Baixo Giro" class="chk-giro"> Baixo Giro</label>
    </div>

    <div class="bloco-filtro">
      <h4>Dep.</h4>
      <label><input type="checkbox" value="UDEI" class="chk-dep"> UDEI</label>
      <label><input type="checkbox" value="USAD" class="chk-dep"> USAD</label>
    </div>

    <div class="bloco-filtro">
      <h4>Tecnologia</h4>
      <div id="lista-tecnologia"></div>
    </div>

    <div class="acoes-modal">
      <button id="btn-limpar">Limpar</button>
      <button id="btn-aplicar">Aplicar</button>
    </div>
  </div>
</div>
</html>
